name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build Release
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout selected tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch --tags
          git checkout "$RELEASE_TAG"

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Run tests
        run: swift test

      - name: Import signing certificate
        id: signing
        env:
          DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$DEVELOPER_ID_P12_BASE64" ]; then
            echo "No signing secrets configured; building ad-hoc (not distributable)." >&2
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/ccawake-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"

          echo "$DEVELOPER_ID_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DEVELOPER_ID_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.*)"/\1/')
          echo "Resolved signing identity: $IDENTITY"
          echo "signed=true" >> "$GITHUB_OUTPUT"
          echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"
          echo "keychain=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"
          rm -f "$CERT_PATH"

      - name: Build app bundle
        env:
          SIGN_IDENTITY: ${{ steps.signing.outputs.identity || '-' }}
        run: sh scripts/build-app.sh

      - name: Notarize and staple
        if: steps.signing.outputs.signed == 'true'
        env:
          AC_APPLE_ID: ${{ secrets.AC_APPLE_ID }}
          AC_APP_PASSWORD: ${{ secrets.AC_APP_PASSWORD }}
          AC_TEAM_ID: ${{ secrets.AC_TEAM_ID }}
        run: |
          NOTARIZE_ZIP="$RUNNER_TEMP/ccAwake-notarize.zip"
          ditto -c -k --keepParent .build/ccAwake.app "$NOTARIZE_ZIP"
          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$AC_APPLE_ID" \
            --password "$AC_APP_PASSWORD" \
            --team-id "$AC_TEAM_ID" \
            --wait
          xcrun stapler staple .build/ccAwake.app
          spctl -a -vvv .build/ccAwake.app

      - name: Clean up keychain
        if: always() && steps.signing.outputs.signed == 'true'
        run: security delete-keychain "${{ steps.signing.outputs.keychain }}" || true

      - name: Package app
        run: |
          ARTIFACT_DIR=".build/release-artifacts"
          ZIP_PATH="$ARTIFACT_DIR/ccAwake-$RELEASE_TAG.app.zip"
          SHA_PATH="$ZIP_PATH.sha256"

          mkdir -p "$ARTIFACT_DIR"
          ditto -c -k --sequesterRsrc --keepParent .build/ccAwake.app "$ZIP_PATH"
          shasum -a 256 "$ZIP_PATH" > "$SHA_PATH"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccAwake-${{ env.RELEASE_TAG }}
          path: .build/release-artifacts/*

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ZIP_PATH=".build/release-artifacts/ccAwake-$RELEASE_TAG.app.zip"
          SHA_PATH="$ZIP_PATH.sha256"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$ZIP_PATH" "$SHA_PATH" --clobber
          else
            gh release create "$RELEASE_TAG" "$ZIP_PATH" "$SHA_PATH" \
              --title "ccAwake $RELEASE_TAG" \
              --generate-notes
          fi
